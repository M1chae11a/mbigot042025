<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cards with Icons</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body
        {
            background-color: rgb(238, 254, 255);
            color: rgb(126, 183, 180);
            font-family: monospace;
            line-height: 1.5;
            margin: auto;
            text-align: center;
        }

        h1 h2
        {
            text-align: center;
        }

        .fbcards
        {
            background-color: rgba(163, 217, 199, 0.573);
            border: 2px solid rgba(205, 243, 239, 0.805);
            padding: 1rem;
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cardcircle
        {
            background-color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin: auto;
            
            box-shadow: 2px 2px 5px rgba(140, 218, 209, 0.805);
        }

        .card
        {
            background-color: aliceblue;
            border: 2px solid rgba(205, 243, 239, 0.805);
            padding: 1rem;
            text-align: center;
            border-radius: 8px;
        }

        @media screen and (min-width: 700px)
        {
            .fbcards
            {
                flex-direction: row;
            }
        }
    </style>
</head>

<body>
    <h1>Cards with Icons</h1>
    <h2>Font Awesome</h2>

    <section class="fbcards">
        <article class="card">
            <div class="cardcircle">
                <i class="fa-solid fa-shield-dog"></i>
            </div>

            <h3>Card Header</h3>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem, aut.</p>
        </article>

        <article class="card">
            <div class="cardcircle">
                <i class="fa-solid fa-shield-dog"></i>
            </div>

            <h3>Card Header</h3>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem, aut.</p>
        </article>

        <article class="card">
            <div class="cardcircle">
                <i class="fa-solid fa-shield-dog"></i>
            </div>

            <h3>Card Header</h3>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem, aut.</p>
        </article>
    </section>
</body>
</html>
